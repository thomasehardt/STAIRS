# Ruff configuration for Smart Telescope Planner
line-length = 88
target-version = "py313"

# Selection of rules to enable/disable
[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ANN", # flake8-annotations
]

ignore = [
    "B008", # Do not perform function call `Depends` in argument defaults (FastAPI standard)
    "ANN001", # Missing type annotation for function argument
    "ANN002", # Missing type annotation for *args
    "ANN003", # Missing type annotation for **kwargs
    "ANN201", # Missing return type annotation for public function
    "ANN202", # Missing return type annotation for private function
    "ANN204", # Missing return type annotation for special method
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "B904", # Within an `except` clause, raise exceptions with `raise ... from err`
    "E402", # Module level import not at top of file (sometimes necessary for local imports)
    "F401", # Unused imports (sometimes intentional in __init__.py)
]

[lint.flake8-annotations]
allow-star-arg-any = true

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
